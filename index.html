<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moneyball Pro | Sistema</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: {
                        base: { bg: '#05070d', panel: '#0d1220', card: '#111827', border: '#1f2937' },
                        accent: { DEFAULT: '#8b5cf6', dim: '#6d28d9' },
                        conf: { alta: '#10b981', media: '#f59e0b', baixa: '#ef4444' },
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-base-bg text-slate-200 font-sans min-h-screen">
    <div class="max-w-2xl mx-auto p-4 md:p-8 space-y-6">

        <!-- HEADER -->
        <div class="text-center space-y-1">
            <h1 class="text-2xl md:text-3xl font-extrabold text-white tracking-tight">🚀 Moneyball Pro</h1>
            <p class="text-xs text-slate-500">Scanner coleta o MDM → BetBuilder calcula o bilhete</p>
        </div>

        <!-- NAVEGAÇÃO ENTRE MÓDULOS (Scanner / BetBuilder / Configurações) -->
        <div id="app-tabs" class="grid grid-cols-3 gap-2"></div>

        <!-- Cada módulo monta seu próprio conteúdo dentro da sua <section> -->
        <section id="view-scanner"></section>
        <section id="view-betbuilder" class="hidden"></section>
        <section id="view-config" class="hidden">
            <div class="bg-base-panel border border-base-border rounded-2xl p-6 space-y-2">
                <h2 class="text-sm font-semibold text-slate-300">Configurações</h2>
                <p class="text-xs text-slate-500">Nada por aqui ainda — a chave do Groq fica na própria aba BetBuilder, e a URL do Worker do Scanner fica em <code class="text-slate-400">scanner/scanner.js</code>.</p>
            </div>
        </section>
    </div>

    <!-- ES Modules nativos, sem build step. Precisa ser servido via http(s)
         (GitHub Pages funciona; abrir o arquivo direto com file:// no navegador
         bloqueia módulos por CORS — pra testar local, rode algo como
         `python3 -m http.server` na pasta e abra http://localhost:8000). -->
    <script type="module">
        import { initAppTabs } from "./shared/ui.js";
        import { initScanner } from "./scanner/scanner.js";
        import { initBetBuilder } from "./betbuilder/betbuilder.js";

        initAppTabs();
        initScanner();
        initBetBuilder();
    </script>
</body>
</html>
